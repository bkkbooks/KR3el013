body:
  text: 凡例一凡治傷先須認明穴部若穴不明治則有誤故繪總穴人圖及靈樞經骨度全圖以便學者參考一人身骨部長短有尺寸古抄靈樞經骨度繪出以便刺繆用法中指同身寸為準一人之穴部總多一穴有幾名之呼難以辨別故照洗冤録人圖繪閲有致命不致命處易於分別一凡人之脫骱斷骨其骨骱包於肉裡外視難明恐有差誤故照骨圖繪明可辨其骱之形其骨之狀臨症時雖於肉裡能洞悉其形狀學者能再於枯髏上細細辨明更詳一治傷制器具以輔手法之成功應用之器具亦繪圖形使學者依樣立法一周身名位骨圖甚多恐難熟記故録其注釋會集一篇學者誦而熟之則瞭然心目矣一治傷須明其脈理與症合參庶不誤耳茲敘其略若要精微須詳脈訣一三十六則參正骨心法之精義合平日試驗之真傳分為條則使學者熟讀可括症治諸法之要一凡三十六則內應用諸方俱以經驗奈其湯液藥名總衆記憶良難渾括為歌易於成誦臨用時某症某方某藥瞭然心目如其藥味加減分量多寡全在醫者隨症之輕重酌量可也一所編歌括其中平仄韻腳不計者因限其湯名藥名難以更易也末附諸方抄集傷科各家之祕雖未經試驗不敢擅刪以備明眼之採擇一又附急救良方以便一時之取用並廣學者之心胸可行方便靈樞經骨度尺寸頭部項發以下至脊骨長二寸半自後髮際以至大椎項骨三節處也按頭部折法以前髮際至後髮際折為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸橫寸法以眼內角至外角此為一寸頭部橫直寸法並依此胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突空處缺盆之下𩩲骭之中長九寸胸圍四尺五寸兩乳之間廣九寸半當折八寸為當𩩲骭中下至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至橫骨長六寸半橫骨橫長六寸半毛際下骨曰橫骨按此古數以今用上下穴法參較多有未合宜從後胸腹折為當兩脾之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫按胸腹折法直寸以中行為之自缺盆中天突穴起至歧骨際上中庭穴止折作八寸四分自𩩲骭上歧骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸橫寸以兩乳相去折作八寸胸腹橫直寸法並依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨人之所以能負任者以是骨之巨也脊骨二十四節今云二十一節者除項骨三節不在內也腰圍四尺二寸按背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍相平下七節各一寸二分六釐共八寸八分二釐共二尺九寸九分六釐不足四釐者有零未盡也直寸依此橫寸用中指同身寸法脊骨內闊一寸凡云第二行挾脊一寸半三行挾脊三寸者皆除脊一寸外淨以寸半三寸論故在二行當為二寸在三行當為三寸半也側部自柱骨下行腋中不見者長四寸柱骨頸項根骨也腋以下至季脅長一尺二寸季脅小肋也季脅以下至髀樞長六寸大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當足少陽環跳穴處也髀樞下至膝中長一尺九寸橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半上廉下廉可摸而得內輔下廉下至內踝長一尺二寸內踝以下至地長三寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至末長四寸半指之後節曰本節膝以下至外踝長一尺六寸膝膕以下至跗屬長一尺二寸膕腿彎也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸外踝以下至地長一寸足長一尺二寸廣四寸半按骨度乃靈樞經骨度篇之文論骨之長短皆古數也然骨之大者則太過小者則不及此亦言其則耳若周身手足折量之法用前中指同身寸法為是同身寸量法詳刺灸書中照檢骨格圖佚照洗冤録尸格圖佚器具總論跌撲損傷雖用手法調治恐未盡得其宜以致有治如未治之苦則未可云醫理之周詳也爰因身體上下正側之象制器以正之用輔手法之所不逮以冀分者復合欹者復正高者就其平陷者升其位則危證可轉於安重傷可就於輕再施以藥餌之功更示以調養之善則正骨之道全矣攀索攀索者以繩挂於高處用手攀之也疊磚疊磚者以磚六塊分左右各疊置三塊兩足踏於其上也用法詳於第十五則內腰柱腰柱者以杉木四根制如扁擔形寬一寸厚五分長短以患處為度俱自側面鑽孔以繩聯貫之用法釋義凡腰間閃挫結氣者以常法治之若腰節骨被傷錯筍膂肉破裂筋斜佝僂者用醋調定痛散敷於腰柱上視患處將柱排列於脊柱兩旁務令端正再用蘄艾做成薄褥覆於柱上以御風寒用寬長布帶繞向腹前緊緊扎裹內服藥餌調治自愈木板木板者用極薄之杉木板如有糕匣木板者更妙用法先以白布條纏於傷處至二三重後將板四圍覆上又將布纏之外再用杉籬裹於外也其用詳於第十六則內杉籬杉籬者復逼之器也量患處之長短闊狹曲直凸凹之形以杉木為之酌其根數記清次序不得紊亂然後於每根兩頭各鑽一孔以繩聯貫之有似於籬故名焉裹於杉板之外取其堅徑不致斷骨之走動耳抱膝抱膝者用絲絃藤作圈較膝蓋骨稍大一些以布條纏於圈上作四足之形扎於膝上用法詳於第二十二則內周身名位骨度注釋頭者人之首也凡物獨出之首皆名曰頭腦者頭骨之髓也俗名腦子顛者頭頂也顛頂之骨俗名天靈蓋囟者顛前之頭骨也小兒初生未闔名曰囟門已闔名曰囟骨即天靈蓋後合之骨面者凡前曰面凡後曰背居頭之前故曰面也顏者眉目間名也額顱額前髮際之下兩眉之上名曰額一曰顙者亦額之謂也頭角額兩旁稜處之骨也鬢骨即兩太陽之骨也目者司視之竅也目胞者一名目窩一名目裹即上下兩目外圍之胞也目綱者即上下目胞之兩瞼邊又名曰睫司目之開闔也目內眥者乃近鼻之內眼肉以其大而圓故又名大眥也目外眥者乃近鬢前之眼肉也以其小而尖故稱目鋭眥也目珠者睛之俗名也目系者目睛入腦之系也目眶骨者目窩四圍之骨也上曰眉稜骨下即䪼骨䪼骨之外即顴骨䪼者目下之眶骨顴骨內下連上牙床者也頞者鼻梁即山根也鼻者司臭之竅也兩孔之界骨名曰鼻柱下至鼻盡之處名曰準頭頄者䪼內鼻旁間近生門牙之骨也顴者面兩旁高起之大骨也顑者俗呼為腮口旁頰前肉之空軟處也耳者司聽之竅也蔽者耳門也耳郭者耳輪也頰耳前顴側面兩旁之稱也曲頰者頰之骨也曲如環形受頰車骨尾之鉤者也頰車者下牙床骨也總載諸齒能咀食物故名頰車人中者鼻柱之下唇之上穴名水溝口者司言食之竅也唇者口端也吻者口之四周也頤者口角後顑之下也頦者口之下唇至末之處俗名下巴殼也頜者頦下結喉上兩側肉之空軟處也齒者口齦所生之骨也俗名曰牙有門牙虎牙槽牙上下盡根牙之別舌者司味之竅也舌本者舌之根也頏顙者口內之上二孔司分氣之竅也懸壅垂者張口視喉上似乳頭之小舌俗名碓嘴會厭者覆喉管之上竅似皮似膜發聲則開咽食則閉故為聲音之戶也咽者飲食之路也居喉之後喉者通聲息之路也居咽之前喉嚨者喉也肺之系也嗌者咽也胃之系也結喉者喉之管頭也其人瘦者多外見頸前肥人則隱於肉內多不見也胸膺者缺盆下腹之上有骨之處也膺者胸前兩旁高處也一名曰臆胸骨肉也俗名胸膛𩩲骭者胸之衆骨名也乳者膺上突起兩肉有頭婦人以乳兒者也鳩尾者即蔽心骨也其質系脆骨在胸骨之下歧骨之間膈者胸下腹上之界內之膜也俗名羅膈腹者膈之下曰腹俗名肚臍之下曰少腹亦名小腹臍者人之初生胞帶之處也毛際者小腹下橫骨間叢毛之際也下橫骨俗名蓋骨篡者橫骨之下兩股之前相合共結之凹也前後兩陰之間名下極穴又名屏翳穴會陰穴男女陰器之所也睪丸者男子前陰之兩丸也上橫骨在喉前宛宛中天突穴之外小灣橫骨旁接柱骨之骨也柱骨者膺上缺盆之外俗名鎖子骨也內接橫骨外接肩解也肩解者肩端之骨節解處也髃骨者肩端之骨也即肩胛骨頭臼之上稜骨也其臼接臑骨上端俗曰肩頭其外曲捲翅骨肩後之稜骨也其下稜骨在背肉內肩胛者即髃骨之末成片骨也亦名肩膊俗名鍁板子骨臂者上身兩大支之通稱也一名曰肱俗名胳膊胳膊中節上下骨交接處名曰肘肘上之骨曰臑骨肘下之骨曰臂骨臂骨有正輔二骨輔骨在上短細偏外正骨居下長大偏內俱下接腕骨也腕者臂掌骨接交處以其宛屈故名也當外側之骨名曰高骨一名鋭骨亦名踝骨掌者手之衆指之本也掌之衆骨名壅骨合湊成掌非塊然一骨也魚者在掌外側之上隴起其形如魚故謂之魚也手者上體所以持物也手心者即掌之中也手背者手之表也指骨者手指之骨也第一大指名巨指在外二節本節在掌第二名食指又名大指之次指三節在外本節在掌第三中指名將指三節在外本節在掌第四指名無名指又名小指之次指三節在外本節在掌第五指為小指三節在外本節在掌其節節交接處皆有碎骨筋膜聯絡爪甲者指之甲也足趾同歧骨者凡骨之兩叉者皆名歧骨手足同臑者肩膊下內側對腋處高起軟白肉也腋者肩之下脅之上際俗名胳肢窩脅肋者腋下至肋骨盡處之統名也曰肋者脅之單條骨之謂統脅肋之總又名曰胠季脅者脅之小肋骨也俗名軟肋䏚者脅下無肋骨空軟處也腦後骨者俗呼腦杓枕骨者腦後骨之下隴起者是也其骨或稜或平或長或圓不一完骨者耳後之稜骨名曰完骨在枕骨下兩旁之稜骨也頸項者頸之莖也又曰頸者頸之側也項者頸之後也俗名脖項頸者頭之莖骨肩骨上際之骨俗名天柱骨也項骨者頭後頸骨之上三節圓骨也背者後身大椎以下腰以上之統稱也膂者挾脊骨兩旁肉也脊骨者脊膂骨也俗名脊梁骨腰骨者即脊骨十四椎下十五十六椎間尻上之骨也其形中凹上寬下窄方圓二三寸許兩旁四孔下接尻骨上際也胂者腰下兩旁踝骨上之肉也臀者胂下尻旁大肉也尻骨者腰骨下十七椎十八椎十九椎二十椎二十一椎五節之骨也上四節紋之旁左右各四孔骨形內凹如瓦長四五寸許上寬下窄末節更小如人參蘆形名尾閭一名骶端一名橛骨一名窮骨在肛門後其骨上外兩旁形如馬蹄附著兩踝骨上端俗名胯骨肛者大腸下口也下橫骨踝骨楗骨者下橫骨在少腹下其形如蓋故名蓋骨也其骨左右二大孔上兩分出向後之骨首如張扇下寸許附著於尻骨之上形如馬蹄之處名曰踝骨下兩分出向前之骨末如楗柱在於臀內名曰楗骨與尻骨成鼎足之勢為坐主骨也婦人名曰交骨其骨面名曰髖挾髖之曰名曰機又名脾樞外接股之髀骨也即環跳穴處此一骨五名也股者下身兩大支之通稱也俗名大腿小腿中節上下交接處名曰膝膝上之骨曰髀骨股之大骨也膝下之骨曰胻骨脛之大骨也髀骨者膝上之大骨也上端如杵接於髀樞下端如錘接於胻骨也胻骨者俗名臁脛骨也其骨兩根在前者名成骨又名骭骨形粗膝外突出之骨也在後者名輔骨形細膝內側之小骨也伏兔者髀骨前膝之上起肉似俯兔故曰伏兔膝解者膝之節解也臏骨者膝上蓋骨也連骸者膝外側二高骨也膕者膝後屈處俗名腿凹也腨者下腿肚也一名腓腸俗名小腿肚踝骨者胻骨之下足附之上兩旁突出之高骨在外為外踝在內為內踝也足者下體所以趨步也俗名腳跗骨者足背也一名足趺俗稱腳面跗骨者足趾本節之衆也足心者即踵之中也跟骨者跟足後根之骨也趾者足之指也其數五名為趾者別於手也居內之大者名大趾第二趾名大趾之次趾第三趾名中趾第四趾名小趾之次趾第五趾居外之小者名小趾足之指節亦與手指節同其大趾之本節後內側圓骨形𪒟者名核骨三毛者足大趾爪甲後為三毛毛後橫紋為聚毛踵者足下面著於地之謂也俗名腳底板脈訣傷科之脈須知確鑿蓄血之症脈宜洪大失血之脈洪大難握蓄血在中牢大卻宜沉澀而微速愈者稀失血諸症脈必現芤緩小可喜數大甚憂浮芤緩澀失血者宜若數且大邪勝難醫蓄血脈微元氣必虛脈症相反峻猛難施左手三部浮緊而弦外感風寒右手三部洪大而實內傷蓄血或沉或浮寒凝氣束乍疏乍數傳變莫度沉滑而緊痰瘀之作浮滑且數風痰之惡六脈模糊吉凶難摸和緩有神雖危不哭重傷痛極何妨代脈可以醫療不須驚愕欲知其要細心習學第一則金瘡論治夫金瘡者乃刀斧劍刃之所傷也故名曰金瘡蓋木乃春之權金乃秋之令春則萬物始生故春屬震乃東方甲木之氣也秋則萬物凋零故金屬兌乃西方庚金之氣也金瘡之色最喜者淡紅故吉多而凶少最惡者紫黑故少吉而多凶但金屬肺患金瘡者則忌咳嗽嘔噦亟宜避風為妥夫風屬巽木肝之氣也瘡屬庚金肺之候也如瘡口被風邪所客則木旺生火反克肺金而成破傷風矣致瘡口浮腫潰爛流膿變生諸症甚則憎寒壯熱口噤目斜身體強直角弓反張危在旦夕救之不及者死其看法須辨瘡口之淺深脈象之虛實年歲之老少稟賦之厚薄若胃氣益旺飲食如常此為最善蓋脾胃屬土土生萬物為陽氣之元陽氣旺則陰血易生尤須戒怒絶欲怒則瘡口迸裂變生胬肉欲則瘡口腐爛易損新肌所賴髓經而治轉危為安矣凡金瘡初治輕者當出血之時用止血絮封固傷口急止其血如無所犯待其結痂自愈重者筋斷血飛摻如聖金刀散用止血絮扎住血止後若腫潰去其前藥再塗玉紅膏外蓋陀僧膏止痛生肌初服三黃寶蠟丸若腫痛服黎洞丸如出血過多面黃眼黑不可攻瘀宜服八珍湯甚者獨參湯先固根本凡初傷時切忌熱湯淋洗恐冒湯火之毒若傷口腫潰流膿用甘蔥煎洗淨再摻金槍鐵扇散收濕拔膿外蓋玉紅膏止痛生肌防護風邪可無後患凡服湯藥必以和營養衛為主若有傷風身熱腫痛等象視其脈浮無力則病在太陽宜羌活湯汗之脈長有力則病在陽明宜承氣湯下之脈緊而弦則病在少陽宜柴胡湯和解之若傳變入里則不治矣夫金瘡變易各有治法或居於邊疆偶為刀箭所傷非得勝之藥安能治之乎虎鈴經曰人為兵器所傷出血者必口渴甚不可妄與熱湯及熱酒須干食肥膩之物取其解渴而已斯無妨害即熱粥亦不宜多飲多則血沸出不止其所忌蓋有八焉一忌罵怒二忌喜笑三忌高聲四忌勞力五忌妄動六忌熱羹粥飲七忌過酒八忌酸鹹此八者犯之鮮有得生者亦有不可治者九曰傷腦曰傷天倉曰傷臂中跳脈曰傷大小腸曰傷五臟此九者皆死又有難治者四腦破髓出及咽喉中沸聲兩目直視並痛在不傷處經曰出血不止前赤後黑或肌肉腐爛寒凝堅實其瘡難愈有此四者皆不可療更按其脈之虛細沉小和緩者生若浮洪數大急疾者死如失血過多急宜人參補氣即經所謂陽生陰長之義耳第二則治傷法論夫跌打損傷墜墮磕磞之證專從血論或有瘀血停積或為亡血過多然後施治庶不有誤若皮不破而內損者多有瘀血停滯或積於臟腑者宜攻利之或皮開肉綻亡血過多者宜補而行之更察其所傷上下輕重淺深之異經絡氣血多少之殊先逐其瘀而後和營止痛自無不效內經云形傷則痛氣傷則腫又曰先腫而後痛者形傷氣也先痛而後腫者氣傷形也凡打撲閃錯或惱怒氣滯血凝腫痛或因叫號血氣損傷或過服克伐之劑或外敷寒涼之藥致氣血凝結者宜活血順氣之法夫損傷雜證不及備載俱分門晰類詳列於後學者宜盡心焉第三則跌打損傷內治證是跌打損傷之證惡血留內則不分何經皆以肝為主蓋肝主血也敗血必歸於肝其痛多在脅肋小腹者皆肝經之道路也宜疏肝調血行經為主王好古云登高墜下撞打等傷心腹胸中停積瘀血或氣瘀攻衝昏迷不醒或寒熱往來日輕夜重變症多端醫者不審其原不切脈之虛實不分經絡臟腑妄投藥劑枉死者多矣故臨症時須察脈之虛實審症輕重藥配君臣佐使治分老幼強弱即從上中下三焦分別部位若瘀在上而吐血者宜犀角地黃湯在中者桃仁承氣湯在下者抵當湯虛人宜佐以四物湯若瘀散復元通氣散調之或傷處青腫堅實痛難轉側脈澀而滯者防其氣瘀上衝宜投參黃散逐瘀又宜復元活血湯或受傷日久才醫者敗血堅凝宜服紫金丹逐瘀又祛傷散疏通為要俟其色散淡血和痛止為度或有牙關緊閉用通關散吹入鼻中取嚏投三黃寶蠟丸或奪命丹如口開納藥者可治不納藥者危須忌濕地當風坐臥忌食生冷硬物忌服寒涼藥餌恐其血凝難化遺留後患也凡視重傷先解開衣服遍觀傷之重輕穴之致命與否察色聞聲脈探虛實如六脈和緩者生九候不調者死陰囊內有腎子者可治如入小腹者不治如牙關閉急用開牙散搽之若能蘇醒再投黎洞丸或可挽回醫者須細心審察不可草率誤人第四則至險之證不治論凡至險之症有氣管全斷者不治若稍連續者可治或氣管捏扁氣塞不通醫將二指拈正其管用通關散吹鼻取嚏可也或天柱骨斷額冷脈絶者死或囟門骨破髓出者不治若內膜不穿髓不出者可治或食飽受傷及跌損內臟者不治若過得三日可治或耳後壽臺骨破血流不止者難治胸口大痛青色裹心者死兩乳重傷痛極呼吸不得者難治或腎囊皮破腎子挂出者可治腎子入小腹者不治或腰眼重傷內腎離位或笑或哭者立死或胃腸受傷吐糞或泄糞者立死孕婦足踢小腹者難治重傷後氣出不收眼開者不治口如魚嘴吹沫纏風者不治小腹重傷不分陰陽者難治或跨物失足騎傷陽物始而溺孔出血繼則玉莖腫脹小便點滴不通小腹堅實者死於七日內不治又有八忌一忌傷腦髓出二忌傷臂中跳脈三忌傷小腹膀胱四忌傷海底穴五忌傷內臟六忌傷氣海咽喉痰聲如鋸物七忌疼在不傷處兩目直視八忌血出不止先赤後黑肌肉腐爛臭穢不堪犯此八者難治凡鬥毆時向上打為順氣平打為塞氣倒插打為逆氣凡人血隨氣轉氣順則血順氣逆則血逆塞則氣閉逆則上衝是以傷有平塞順逆之別若治之不辨危在須臾又有五絶之論一看兩眼白睛上紅筋多則瘀血亦多若直視無神不治二扳撳其指甲血即還原者可治不還原者不治三若腳趾與手指甲俱黑者死四陽物縮者不治五腳底之色蠟黃者難治此五絶之症也又有十不治之證顛撲損傷入於肺者縱未即死二七難過左脅下傷透至內者腸傷斷者小腹下傷入內者證候繁多者傷破陰子者老人左股壓碎者血出盡者肩內耳後傷透於內者脈不實者以上諸證不必用藥第五則從高墜下傷凡人從高墜下跌傷五臟不省人事氣塞不通者看其兩太陽及胸前脅下如何若動則可救急用通關散吹鼻中如有嚏語聲得出者投黎洞丸再服復元活血湯逐瘀生新若遲則不救或有從高倒墜天柱骨折致頸插入腔內而左右尚活動者用提法治之或打傷頭低不起用端法治之或墜傷左右歪斜用整法治之或傷而面仰頭不能垂或筋長骨錯或筋聚筋強頭垂不起者用推端續整四法治之臨症時須問其或翻車墜馬或高處墜下或打重跌倒再問或思食不思食若四肢無傷精神不減或能坐起行動者輕或昏睡不語或疼痛呼號瘀聚凝結腫硬筋脹者重投三黃寶蠟丸服接骨紫金丹敷萬靈膏尉定痛散手法詳後第六則顛頂骨傷顛頂骨男子三叉縫女子十字紋一名天靈蓋位居至高內函腦髓以統全體者也或跌打磞撞等傷卒然而死身體強直口鼻尚有出入之氣心口溫熱跳動者可救惟宜屈膝盤坐金鑑盤坐作側臥先將醋調混元膏敷於頂上再將草紙卷點燃著令煙氣熏其口鼻或炭或鐵燒紅淬入醋內使熱氣熏其口鼻引五臟血脈之氣通和待其口中呻吟有聲用童便調八釐散或黎洞丸亦可俟其氣轉陽回外用手法按摩心胸兩腋下並托其手腕頻頻揉摩兩手脈窠凡傷則筋脈強硬頻頻揉摩則心血來復命脈流通即可回生再服接骨紫金丹外用散瘀和傷湯洗去前藥換敷混元膏或大便乾燥乃內存瘀血服加減蘇子桃仁湯或耳聾者用導氣通瘀錠塞耳中食宜素粥切戒惱怒忌油膩麵食臥宜淨室勿令人喧擾若重傷已死者用白布纏頭以木棍輕輕拍擊足心再提發令其頸端直舒其筋絡外敷混元膏內服紫金丹如外皮未破而骨已碎內膜已穿血向內流聲啞不語面青唇黑者不治或頂骨塌陷驚動腦髓七竅出血身挺僵厥昏悶全無知覺者不治或骨碎髓出不治或皮開肉綻血流不止者可治用止血絮封固先止其血服補氣養血湯宜避風寒戒怒遠色俟其結痂若潰爛流膿用甘蔥煎洗去封藥摻鐵扇散蓋玉紅膏服疏風養血湯照法洗換待其結痂痊愈第七則囟門骨傷囟骨者即嬰兒頂骨未合時軟而跳動之處名囟門或跌打損傷骨縫雖綻尚未震動腦髓其頭面浮光眼腫鼻大唇翻舌硬睡臥昏沉肉雖腫而皮未破瘀血內蓄者宜扶起正坐以蔥汁調定痛散敷於傷處用粗紙蘸醋貼於藥上燒鐵尉斗烙紙上以傷處覺熱疼口中有聲為度去藥貼萬靈膏二三日一換用和傷湯洗之自然腫消痛止或皮破血出不止用止血絮封固內服和營養衛湯若潰爛流膿用甘蔥煎洗去前藥摻生肌散貼玉紅膏宜避風寒忌食發物火酒若皮破血流不止骨陷筋翻必損腦髓氣息無聲則危篤難醫若破傷風者照前傷風法治之山角骨即頭頂兩旁稜骨也凌雲骨在前髮際下即正中額骨即額顱也左右天賢骨者即兩額角也睛明骨即目窠四圍目眶骨也眉稜骨其下曰䪼骨下接上牙床也若傷之均照前囟骨傷法治之可也然臨症之權衡用藥之巧妙神而明之存乎其人第八則鼻梁骨斷附目傷鼻梁骨下至準頭傷而出血可治外將止血定痛散敷之內服接骨紫金丹或傷開孔竅或鼻破歪落用整端法用藥敷貼可也若骨破碎內膜穿破口鼻流血者不治中血堂即鼻內頞下脆骨空處也若傷之血流不止神氣昏迷者宜塞鼻丹塞於鼻中用冷水淋激頭頂視其人如氣虛內服人參紫金丹如血瘀服蘇子桃仁湯若血流不止飲食不進氣虛目閉面黃者八日而死或睛明骨傷眼珠挂落者先將收珠散用銀針蘸井花水將藥點眼珠上及點血筋上用舊絹溫湯挪上服還睛湯二三劑又服明目地黃湯調理可愈第九則唇口玉堂傷唇口者司言食之竅也或傷破唇缺先用油線縫合敷止血生肌散蓋玉紅膏內服健脾養胃湯可愈或含刀誤割其舌將斷而未落者用雞子內軟衣袋舌將止痛生肌散蜜調敷舌上頻頻添換使患人仰臥薄粥灌喉不動其舌則易愈又有玉堂在口內上齶一名上含其竅即頏顙也若觸刺傷其左右者惟腫而已若傷正中之孔上通於頞必傷鼻孔之卷肉或犯空竅則血流不止以致鼻目皆腫滿面青紫神倦頭暈痛連腦髓若傷及會厭與上橫骨重則不能言痛連心膈昏迷沉重者險急用膩粉冰片細研吹於患處以止其血服接骨紫金丹再用蟹黃血竭煎湯日漱口二三十次如飲食難進以柿霜玉露霜牛奶或奶油或粉粥面粥等物以涼潤將息得法可愈第十則傷耳耳者司聽之竅也耳門名曰蔽耳輪名曰郭或被砍跌打落或上脫下黏或下脫上連須拈正用封藥敷貼若全脫落急用綴法將兩耳相對用藥貼定再以竹夾子直上橫縛可全又有玉梁骨即耳門骨其處上即曲頰下即頰車兩骨之合鉗也內通腦髓亦關靈明若傷者腫痛流血服接骨紫金丹外用八仙逍遙湯熏洗貼混元膏若傷重內動腦髓及傷靈明昏沉不省若平素氣血皆虛者不治地閣骨即兩車相交之骨又名頦俗名下巴骨也上載牙齒傷之飲食不進目閉神昏心熱神亂服大神效活絡丹再噙化人參紫金丹搽固齒散外貼萬靈膏忌風寒冷物或牙齒傷動者用蒺藜根燒存性為末揩之或以固齒散揩之亦佳第十一則咽喉傷咽喉者乃氣息之路也或被傷或自刎其症迅速急則可救遲則血脫額冷氣絶不治乘其氣未絶而身未冷急用油線縫合摻止痛散將止血絮止其血蓋玉紅膏又將長肉膏長四五寸闊二三寸橫貼連及好肉處不使封藥脫落外用布條纏頸高枕仰臥使項屈不伸刀口易合宜處密室避風使呼吸舒徐用人參川米生薑煎湯時時飲之補接元氣若二三日後有膿水流出解去前藥用甘蔥湯洗淨摻生肌散搽玉紅膏又外貼長肉膏防護風邪冬天三日夏天一二日照法洗換自然痛止其肌漸長服八珍湯調治月餘可愈如大便閉結不可妄攻服麻仁丸至急者用膽導法無損其元按內景圖云喉在前主出咽在後主納喉系堅空連接肺本為氣息之路呼吸出入下通諸臟乃氣化之要道也咽系柔空下接胃本為飲食之路水穀歸胃下通諸腑乃轉運之關津也若傷之豈不至險乎治者須心手相應不差毫髮乃無誤也而先看其刀彎者其痕深其刀直者其痕淺若左手持刀而刎者深右手持刀而刎者淺一刀勒者深兩刀勒者淺如喉脘破而有出入之氣封藥吸進必嗆咳先用雞子內軟衣蓋於破脘之上再將藥封之則不嗆矣如單脘破者月餘而痊雙脘破者兩月而愈照法治之可也第十二則腹傷腸出如鏃破大小腹致腸突出者看腸外衣膜穿破否若膜穿者腸必逐條而散也則不治若腸雖未出而內膜已穿血向內流者不治如膜未穿破雖險可治又有油膜突出者亦可治不可傷其膜宜敷收膜散外蓋玉紅膏冀其漸平如腸出者將溫湯浴暖其腸不可傷犯一人將醋和冷水不令病者知覺急噀其面其腸自收用油線縫合不可太深恐傷其肉摻鐵扇散搽玉紅膏外蓋長肉膏又用布纏腰數轉須避風邪切戒惱怒高聲恐有崩裂之患初服舒腸活血湯再服八珍湯調理月餘可愈或陰囊皮破腎子挂出用溫湯挪上油線縫合搽玉紅膏又蓋長肉膏服調理之劑可愈或皮不破而腎子入小腹者不治凡皮肉穿破之症失血過多營衛已虛或被風邪襲入經絡漸傳入里寒熱交作口噤咬牙角弓反張口吐涎沫身冷自汗傷口反為底陷其毒內攻其危甚速投萬靈丹或大神效活絡丹以玉真散敷於患處得膿焮腫身溫有汗為效若前症不退傷口不高乍醒乍昏時發時止口噤不開語聲不出終屬死症第十三則手法論夫接骨入骱者所賴其手法也兩手安置其筋骨仍復於舊位也其傷有輕重而手法有所宜失宜其痊可之遲速及遺留之殘疾皆關乎手法之所施也人身有十二經筋脈羅列必知其體識其部位機觸於外巧生於內手隨心轉法從手出或拽之離而復合或推之就而復位或正其斜或完其闕或骨有截斷碎斷斜斷骱有全脫半脫筋有弛縱卷攣翻轉離合在其肉內以手捫之自悉其情法之所施不知其苦方為手法也傷有關性命者如七竅上通腦髓膈近心君四末受傷痛苦入心若元氣素壯敗血易消刻期可愈元氣素弱一旦被傷勢必難支若手法再誤萬難挽回尤當慎之醫者心明手巧知其病情善用手法治之多效若草率不較誤入非淺雖筆之於書乃活法多端難以盡述須得口傳心授臨症多而活法變庶無誤耳第十四則鎖子骨附胸脅鎖子骨經名柱骨橫臥於兩肩前缺盆之外其兩端外接肩解或擊打偏墜傷斷者用手法先按胸骨將肩端向內合之揉摩斷骨令其復位用帶挂肩於項勿使搖動服接骨紫金丹外敷定痛散貼萬靈膏可愈胸骨即𩩲骭骨一名膺骨又名臆骨俗名胸膛其兩腋下至肋骨盡處名脅脅下小肋名季脅俗名軟肋統脅肋之總名曰胠岐骨者即兩鳧骨端相接之處下即鳩尾骨也蔽心骨即鳩尾骨也其質系脆骨在胸下岐骨之間鳧骨者即胸下邊肋也傷者從前面撞打跌撲者重從後面來者輕用手法按摩之如肋骨斷者用布纏縛數轉服接骨紫金丹外用定痛散尉之貼萬靈膏若內蓄瘀血腫痛傴僂難仰者服紫金丹或大便實者參黃散下之若受傷日久胸骨高起肌肉削瘦內有邪熱瘀血痞氣膨悶睛藍體倦痰喘咳嗽者服紫金丹若傷重內干胸中心肺兩臟之氣昏迷目閉嘔吐血水厄逆戰栗者危在旦夕不治心坎上橫骨又名人字骨從下而上若第一節傷者一年死第二節傷者二年死第三節傷者三年死此穴內應乎肺傷必吐血咳嗽凡胸前背後重傷久則成痰火勞怯左乳傷發咳嗽右乳傷發厄逆凡胸脅諸傷黎洞丸三黃寶蠟丸皆可酌用之再服理肺之劑以收功第十五則背脊骨傷背者自後身大椎骨以下腰以上之通稱也一名脊骨一名膂骨俗呼脊梁骨其形一條居中共二十一節下盡尻骨之端上載兩肩內系臟腑其兩旁諸骨附接橫疊而彎合於前則為胸脅也腰骨者即脊骨之十四椎十五椎十六椎也尾骶骨即尻骨也其形上寬下窄上承腰脊諸骨兩旁各有四孔名曰八髎其末節名曰尾閭一名骶端一名撅骨一名窮骨俗名尾椿也或跌打傷者瘀聚凝結脊筋隴起當先柔筋令其和軟內服紫金丹敷定痛散燒紅鐵烙尉之貼混元膏若骨縫疊出俯仰不能疼痛難忍腰筋僵硬使患者兩手攀索兩足踏磚上每足下疊磚三塊踏定將後腰拿住各抽去磚一塊令病人直身又各去一塊如是者三其足著地使氣舒瘀散陷者能起曲者可直再將腰柱裹住緊緊縛之勿令窒礙但宜仰臥不可側睡膂骨正而患除服接骨紫金丹如胸陷不直者亦用此法或氣門傷則氣塞不通口噤反張身強如死過不得三個時辰若氣從大便出者立斃凡遇此症不可慌張候其氣息有無如無氣者為倒插拳所傷令患人盤坐揪其發伏我膝上敲擊其背心使氣從口出得蘇服黎洞丸尾閭若蹲墊壅腫必連腰胯服黎洞丸再服接骨紫金丹貼萬靈膏踢傷海底穴血必上衝當時耳內響聲大震人必昏暈先服護心丸再服紫金丹第十六則接骨論治接骨者使已斷之骨合攏一處復歸於舊位也凡骨之斷而兩分或折而陷下或破而散亂或岐而傍突相其形勢徐徐接之使斷者復續陷者復起碎者復完突者復平皆賴乎手法也或皮肉不破者骨若全斷動則轆轆有聲如骨損未斷動則無聲或有零星敗骨在內動則淅淅之聲後必潰爛流膿其骨已無生氣脫離肌肉其色必黑小如米粒大若指頭若不摘去潰爛經年急宜去淨如其骨尚未離肉不可生割恐傷其筋俟其爛脫然後去之治法先用代痛散煎湯熏洗將其斷骨拔直相對按摩平正如舊先用布條縛緊又將糕匣木板修圓綁之又將布條纏縛再將杉籬環抱外邊取其緊徑挺直使骨縫無離綻脫走之患內服接骨紫金丹兼調理用地黃湯四五日後放綁復看如其走失仍照前法二三月間換綁數次百日可痊凡人斷臂與斷膊斷腿與斷胻綁法相同治分上下或用器具與形體相得隨機變化可也或筋斷者難續蓋筋因柔軟全斷則縮於肉裡無用巧之處也若斷而未全宜用續筋藥敷之內服壯筋養血湯可愈第十七則脫下頦附失頸下頦者即牙車相交之骨也若脫則飲食言語不便由腎虛所致其骱曲如環形與上頰合鉗最難上也先用寬筋散煎湯熏洗次用布條裹醫者二拇指入口余指抵住下頦捺下推進其骱有響聲齒能合者上也服補腎壯筋湯夫人之筋賴氣血充養寒則筋攣熱則筋縱筋失營養伸舒不便感冒風寒以患失頸頭不能轉使患人低坐用按摩法頻頻揉摩一手按其頭一手扳其下頦緩緩伸舒令其正直服疏風養血湯可也第十八則髃骨骱失髃骨者肩端之骨即肩胛骨也其臼含納臑骨上端其處名肩解即肩䯋與臑骨合縫處也俗名吞口一名肩頭其下附於脊骨成片如翅者其骱若脫手不能舉使患人低坐一人抱住其身將手拔直用推拿法酌其重輕待其筋舒一手捏其肩抵住骱頭齊力拔出骱內有響聲者乃復其位矣用布帶落其項下服舒筋活血湯凡上骱時骱內必有響聲活動其骱以上若無響聲活動者其骱未上也不可誤人第十九則曲䐐骱肘骨者胳膊中節上下支骨交接處也俗名鵝鼻骨上接臑骨其骱名曲䐐自肘至腕有正輔二根其在下而形體長大連肘尖者為臂骨其在上而形體短細者為轉骨疊並相倚下接於腕骨其骱若出一手捏住骱頭一手拿其脈窩先令直拔下骱內有聲響將手曲轉搭著肩頭肘骨合縫其骱上矣服生血補髓湯或紫金丹第二十則手腕骱腕骨即掌骨乃五指之本節也俗名虎骨其大小六枚湊以成掌非塊然一骨也其上並接臂輔兩骨之端其外側高骨俗名龍骨能宛屈上下故名腕若手掌著地只能傷腕若手指著地其指翻貼於臂者腕縫必開壅腫疼痛先兩手揉摩其腕一手按住其骱一手拔其指掌掬轉有聲活動其骱復位仍按摩其筋必令調順然命脈之所服寬筋散須防著寒得免痠疼之患凡人手指有三節其骱突出者俱可拔直捏正屈伸活動服和營止痛湯其法相同不必逐骱論也第二十一則臀骱骨胯骨即髖骨也又名髁骨其外向之凹其形似臼以納髀骨之上端如杵者也名曰機又名髀樞即環跳穴處也俗呼臀骱若出之則難上因其膀大肉厚手捏不住故也必得力大者三四人使患者側臥一人抱住其身一人捏膝上拔下一手撳其骱頭迭進一手將大膀曲轉使膝近其腹再令舒直其骱有響聲者以上再將所翻之筋向前歸之服生血補髓湯再服加味健步虎潛丸若骱不上則臀努斜行終身之患也慎之第二十二則大楗骨膝蓋骨大楗骨名髀骨上端如杵入於髀樞之臼下端如錘接於胻骨統名曰股乃下身兩大支之通稱也俗名大腿骨其下有膝蓋骨即連骸又名臏骨形圓而扁覆於楗胻上下兩骨之端本活動物也內面之筋上過大腿至兩脅下過胻骨至足背內經曰膝乃筋之府若傷之上連腰屈疼痛下移胻骨焮腫或足腹冷硬步履斜行或膀子重傷後成黃病服紫金丹再茵陳等湯治黃病之藥收功若膝蓋離位向外側者則內筋腫脹向內側者則筋直膕腫須詳視其骨如何斜錯按法推拿以復其位服補筋湯其骱出者一手按住其膝一手捏住其膀上下拔直將膝曲轉抵著豚爿其骱有聲者上也服生血補髓湯若膝蓋骨破兩爿者用絲絃藤作箍布條縛之生線四根如抱膝圖法將手擠圓箍定其骨膀下縛住屈臥月餘服接骨紫金丹若箍後仍兩爿一生跛足不可治矣第二十三則胻骨腳踝跗骨胻骨即膝下踝上下腿骨也俗名臁脛骨其形二根在前名成骨其形粗在後名輔骨其形細俗名勞堂骨下至踝骨胻骨之下足跗之上兩旁突出之高骨也在內名內踝俗名合骨在外為外踝俗名核骨其骱出者一手抬住其腳踝骨一手扳住腳後根拔直撥筋正骨令其復位其骱有聲轉動如故再用布帶縛之木板夾定服舒筋活血湯一二日後解開視之倘有未平再用手法按摩其筋結之處必令端直再服健步虎潛丸稍愈後若遽行勞動致胻骨之端復走向里歪者則內踝突出腫大向外歪者則外踝突出腫大瘀聚凝結步履無力頗費調治必待氣血通暢始可行動若腳趾骱失與手指同法治之跗者足背也一名足趺俗稱腳面其骨乃足趾本節之骨也其受傷不一輕者僅傷筋肉易治重則骨縫參差難治先以手輕輕搓摩令其骨合筋舒洗八仙逍遙湯貼萬靈膏內服健步虎潛丸及補筋丸可也第二十四則受傷著寒及懷孕而傷凡人跌撲鬥毆內傷其血復輕生投水外著於寒血得寒而凝結寒得血而入深未有能生者也治法先祛其寒繼逐其瘀祛寒用麻桂溫經湯逐瘀投紫金丹若遲延日久則氣滯血凝筋脈拘緊手足攣拳必致不治急服大神效活絡丹冀其漸漸疏通或可挽回若婦人懷孕受傷不可妄投傷藥恐傷胎元反為不美宜服安胎和氣飲稍加祛瘀生新之劑使氣血和而痛自止矣第二十五則受傷感痧論凡受不甚重傷越四五日腹中絞痛胸悶嘔惡或四肢麻木或骨節疼痛脈象或浮或伏與症不合指甲紫兩腿彎有青筋必是痧穢之毒宜刮宜放宜先服散痧之藥不可服傷藥與薑酒熱湯等物若犯之則禍不旋踵矣治法吹人馬平安散吃蟾酥丸又服再造紫金丹俟痧退後再投祛瘀生新之藥始無妨礙又有傷症兼疫症者先治其疫而後治傷庶可兩痊豫臨症時常遇之故特補出放痧穴道歌佚第二十六則損傷出血吐血傷損之症或患處或諸竅出血者此肝火熾盛血熱錯經妄行也用加味逍遙散中氣虛弱血無所附而妄行加味四君子湯中氣下陷補中益氣湯元氣內脫用獨參湯加炮薑附子血蘊於內而嘔血者四物湯加柴芩煩勞太過或惱怒氣逆或過服寒毒等藥致傷陽絡則吐血衄血便血傷陰絡則血積血塊肌肉青黑臟腑虧損經隧失職急補脾肺二臟自愈或嘔吐黑血者因打撲傷損敗血流入胃脘色如豆汁從嘔而出形實者用百合散形虛者加味芎歸湯或出血過多脈洪大而虛重按全無血虛發熱用當歸補血湯脈細沉微按之輕弱此陰盛發熱四君子湯加薑附或筋惕肉瞤此亡血也用聖愈湯發熱汗出不止者血脫也用獨參湯凡血脫之症脈實者難治脈虛者可療也第二十七則胸腹脅肋痛悶傷損之症胸腹痛悶因跳躍捶胸閃挫舉重勞欲恚怒所致喜手摸者肝火傷脾用四君子湯加柴胡山梔如畏摸者肝經血滯也用四物湯柴胡山梔桃仁紅花若胸脅悶痛日晡發熱肝經傷也用加味逍遙散若胸腹悶痛飲食少思肝脾氣俱傷也用四君子湯加芎歸柴梔丹皮若胸腹不利食少無寐脾氣鬱結也用加味歸脾湯若脅肋脹痛大便通和喘咳吐痰肝火侮肺也用小柴胡湯加青皮山梔若胸腹脹痛大便不通喘咳吐血者乃血瘀停滯用當歸導滯散內經云肝藏血脾統血蓋肝屬木木勝侮土脾氣必虛宜清肝養血次壯脾胃則氣血充盛若妄行克伐虛者益虛滯者益滯禍不旋踵矣第二十八則腹痛腰痛傷損腹痛大便不通按之痛甚瘀血內蓄用加味承氣湯既下而痛不止按之仍痛者瘀未盡也用加味四物湯補而行之若腹痛按之不痛者血氣傷也四物湯加參耆白朮補而和之下而胸脅反痛肝血傷也用四君湯加芎歸既下發熱陰血傷也四物湯加參術下後惡寒發熱者氣血傷也八珍湯下後嘔吐者胃氣傷也六君子湯加當歸下後泄瀉不止者六君子湯加肉果補骨脂下後手足俱冷昏憒汗出者陽氣虛寒也用參附湯若吐瀉手足俱冷指甲青黑脾腎虛寒甚也急用大劑參附湯口噤手撤遺尿痰盛唇青體冷者虛極壞症也大劑參附湯以圖僥幸或少腹引陰莖作痛者乃瘀血不行肝經火鬱所致用小柴胡湯加大黃黃連山梔待其痛勢已定再宜養血若誤認寒症投以熱藥重則必危輕則損目若腰痛脊痛因瘀血留太陽經所致服地龍散治之第二十九則杖瘡夾棍傷佚第三十則藥箭傷佚第三十一則諸咬傷佚第三十二則湯火傷佚第三十三則救自縊法佚第三十四則救溺水佚第三十五則運熏灸倒四法及灸臍化痞法附外用運熏灸倒四法宿傷可用新傷不可用新傷者血未歸經恐其瘀血攻心之患也運法凡最輕之傷先用瓜皮散次用麥麩一升胡蔥一把酒藥十丸醋炒香附一升同入鍋內炒熱以社醋烹之蓋片時乘熱布包運動患處冷即換易待其患處汗出如油可也熏法凡宿傷在皮裡膜外雖服行藥不能除根服瓜皮散次用落得打草陳小麥艾葉三味用河水共煎一鍋滾透入小口缸內橫板一塊患人坐板上再將單被蓋身其汗立至不可閃開恐汗即止病根不清也灸法或瘀血在骨節中恐其發毒先服瓜皮散用生炭燒紅地皮社醋烹之再將稻草攤上單被為席使患人臥上厚被蓋暖使其汗出如雨服勝金散而安若氣虛之體不可用此凡倒法病人能言不能食無法可治不得已要使惡物吐之先服硫麝散將患人臥被上每邊兩人牽被到動使人滾轉反側吐出惡物服虻蟲散再調理可愈灸臍法若膀胱傷小便祕結可用田螺麝香搗爛先置臍中再將飛鹽蓋臍上如銅錢厚薄鹽上用艾火灸二三壯即通去麝可也化痞尉法凡人蓄血成痞或在脅內或在腹中服藥難消用飛面量痞之大小四圍作圈使惡物無從逃避圈內置朴硝滿圈恐其側邊卸落以腳條縛之又襯紙二三十重將尉斗盛火尉之俟患處有響聲乃痞消之驗斯運熏灸倒之法恐患人不善服藥不得已而用之亦不可輕使若元氣虛弱之人用之太過必致氣促厥逆之虞醫者慎之第三十六則應刺諸穴素問繆刺論曰人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝下然谷之前血脈出血刺足跗上動脈不已刺三毛各一痏見血立已左刺右右刺左靈樞經寒熱病論篇曰身有所傷血出多及中風寒若有所墮墜四肢懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太陰也臍下三寸關元也靈樞經厥病論曰頭痛不可取於腧者有所擊墮惡血在內傷痛未已可側刺不可遠取也靈樞經邪氣臟腑病形篇曰有所墮墜惡血在內有所大怒氣上而不下積於脅下則傷肝法當先導怒氣勿積於肝則肝可以無傷然後飲以利藥以破惡血則脅下無留血矣又曰有所擊撲若醉入房汗出當風則傷脾素問脈要精微論曰肝脈搏堅而長色不青當病墜若因血在脅下令人喘逆金匱要略曰寸口脈浮微而澀然當亡血若汗出設不汗出者其身有瘡被刀斧所傷亡血故也又論曰肝脈搏堅而色不變必有擊墮之事因膕肉擊傷故惡血必留脅下兼到嘔逆依經針刺然谷足跗或三毛等穴出血或飲利藥使惡血開行當自愈也若脈浮微而澀當知亡血過多依經於三結交關元穴灸之或飲大補氣血之劑而調之則病已矣
